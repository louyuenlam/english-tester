<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#faf6ef">
<link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23faf6ef'/><text x='50' y='70' text-anchor='middle' font-size='58'>🏘️</text></svg>">
<title>對答小鎮 · Hannah's Quick-Response Town</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Noto+Sans+HK:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6ef;
    --cream-dark: #f2ebdc;
    --paper: #fffdf7;
    --ink: #2a2420;
    --ink-soft: #4a3f38;
    --terra: #c86b4a;
    --terra-dark: #a8512f;
    --sage: #7a8471;
    --sage-dark: #5a6451;
    --gold: #c9a84c;
    --gold-dark: #a88828;
    --blue: #5a7a8b;
    --blue-dark: #3d5a6a;
    --burgundy: #8b3a3a;
    --shadow: rgba(58, 40, 28, 0.12);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    min-height: 100%;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }

  body {
    font-family: 'Noto Sans HK', 'Fraunces', serif;
    background:
      radial-gradient(ellipse at top, rgba(90, 122, 139, 0.12), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(200, 107, 74, 0.1), transparent 60%),
      var(--cream);
    color: var(--ink);
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    padding: calc(20px + var(--safe-top)) 16px calc(20px + var(--safe-bottom));
  }

  body::before {
    content: '';
    position: fixed; inset: 0; pointer-events: none;
    background-image: repeating-linear-gradient(45deg, rgba(139, 115, 85, 0.015) 0 1px, transparent 1px 4px);
    z-index: 0;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* ============ HEADER ============ */
  .game-header {
    text-align: center;
    padding: 10px 0 18px;
    position: relative;
  }
  .back-btn {
    position: absolute;
    top: 8px;
    left: 0;
    background: var(--paper);
    border: 1.5px solid var(--cream-dark);
    color: var(--ink-soft);
    width: 40px; height: 40px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  .back-btn:active { background: var(--cream); }

  .game-header .ornament {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 8px;
    margin-bottom: 6px;
  }
  .game-header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 30px;
    color: var(--ink);
    line-height: 1.15;
    margin-bottom: 4px;
  }
  .game-header .subtitle {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 15px;
  }

  /* ============ OVERALL STATS ============ */
  .overall-stats {
    background: var(--paper);
    border: 2px solid var(--cream-dark);
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    box-shadow: 0 2px 0 var(--cream-dark);
  }
  .stat {
    text-align: center;
    flex: 1;
  }
  .stat .num {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--blue-dark);
    display: block;
    line-height: 1.1;
  }
  .stat .lbl {
    font-size: 11px;
    color: var(--ink-soft);
    font-family: 'Fraunces', serif;
    font-style: italic;
  }
  .stat-divider {
    width: 1px;
    height: 30px;
    background: var(--cream-dark);
  }

  /* ============ LEVEL MAP ============ */
  .map {
    position: relative;
    padding: 20px 0 40px;
  }
  .map::before {
    content: '';
    position: absolute;
    left: 50%;
    top: 40px;
    bottom: 40px;
    width: 4px;
    background-image: repeating-linear-gradient(
      to bottom,
      var(--cream-dark) 0 10px,
      transparent 10px 20px
    );
    transform: translateX(-50%);
    z-index: 0;
  }

  .level {
    display: flex;
    justify-content: center;
    margin-bottom: 22px;
    position: relative;
    z-index: 1;
  }
  .level:nth-child(odd) { justify-content: flex-start; padding-left: 8%; }
  .level:nth-child(even) { justify-content: flex-end; padding-right: 8%; }

  .level-node {
    background: var(--paper);
    border: 3px solid var(--cream-dark);
    border-radius: 22px;
    padding: 16px;
    width: 200px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.3, 0.85, 0.4, 1);
    box-shadow: 0 3px 0 var(--cream-dark);
    position: relative;
    text-align: center;
  }
  .level-node:not(.locked):active { transform: translateY(0); }
  .level-node:not(.locked):hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 6px 12px var(--shadow), 0 3px 0 var(--cream-dark);
  }

  .level-node.locked {
    opacity: 0.55;
    cursor: not-allowed;
    background: var(--cream-dark);
  }
  .level-node.locked .emoji { filter: grayscale(1); }

  .level-node.completed { border-color: var(--sage); }
  .level-node.unlocked { border-color: var(--blue); }
  .level-node.boss {
    border-color: var(--burgundy);
    background: linear-gradient(135deg, var(--paper), #fef0ee);
  }
  .level-node.boss.locked {
    background: var(--cream-dark);
  }

  .level-node .level-num {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: var(--paper);
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 13px;
    padding: 3px 10px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .level-node.completed .level-num { background: var(--sage); }
  .level-node.boss .level-num { background: var(--burgundy); }
  .level-node.locked .level-num { background: var(--ink-soft); }

  .level-node .emoji {
    font-size: 42px;
    margin: 6px 0 8px;
    line-height: 1;
  }
  .level-node .title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 17px;
    color: var(--ink);
    line-height: 1.2;
    margin-bottom: 2px;
  }
  .level-node .sub {
    font-size: 11.5px;
    color: var(--ink-soft);
    font-style: italic;
    margin-bottom: 8px;
  }

  .stars {
    display: flex;
    justify-content: center;
    gap: 3px;
    font-size: 16px;
    margin-top: 2px;
  }
  .stars .star {
    filter: grayscale(1) opacity(0.3);
    transition: all 0.3s ease;
  }
  .stars .star.earned {
    filter: none;
    animation: starPop 0.4s ease;
  }
  @keyframes starPop {
    0% { transform: scale(0); }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .lock-icon {
    font-size: 18px;
    margin-top: 4px;
    color: var(--ink-soft);
  }

  /* ============ GAME MODAL ============ */
  .game-modal {
    position: fixed;
    inset: 0;
    background: rgba(42, 36, 32, 0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .game-modal.open { display: flex; }

  .game-sheet {
    background: var(--paper);
    width: 100%;
    max-width: 480px;
    max-height: 94vh;
    border-radius: 24px;
    overflow-y: auto;
    padding: 18px 20px;
    animation: zoomIn 0.3s cubic-bezier(0.3, 0.85, 0.4, 1);
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 500px;
  }
  @keyframes zoomIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .game-header-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .game-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 18px;
    color: var(--ink);
    flex: 1;
  }
  .close-game {
    background: var(--cream);
    border: none;
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    color: var(--ink-soft);
    flex-shrink: 0;
  }
  .close-game:active { background: var(--cream-dark); }

  /* Progress + score row */
  .top-meta {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    align-items: center;
  }
  .game-progress-bar {
    flex: 1;
    height: 8px;
    background: var(--cream-dark);
    border-radius: 4px;
    overflow: hidden;
  }
  .game-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--gold));
    transition: width 0.4s ease;
    border-radius: 4px;
  }
  .score-badge {
    background: var(--sage);
    color: white;
    padding: 4px 10px;
    border-radius: 12px;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ============ COUNTDOWN TIMER ============ */
  .timer-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 14px;
    position: relative;
  }
  .timer-circle {
    width: 80px;
    height: 80px;
    position: relative;
  }
  .timer-circle svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }
  .timer-circle .bg {
    fill: none;
    stroke: var(--cream-dark);
    stroke-width: 6;
  }
  .timer-circle .progress {
    fill: none;
    stroke: var(--sage);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.1s linear, stroke 0.3s ease;
  }
  .timer-circle.warning .progress { stroke: var(--gold); }
  .timer-circle.danger .progress { stroke: var(--terra); animation: pulse 0.5s infinite alternate; }
  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
  }
  .timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--ink);
  }

  /* ============ QUESTION AREA ============ */
  .question-view {
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .question-card {
    background: linear-gradient(135deg, var(--paper), var(--cream));
    border: 2.5px solid var(--cream-dark);
    border-radius: 18px;
    padding: 20px 18px;
    text-align: center;
    margin-bottom: 16px;
    box-shadow: 0 3px 0 var(--cream-dark);
  }
  .question-card.boss-card {
    background: linear-gradient(135deg, #fef0ee, var(--paper));
    border-color: var(--burgundy);
  }
  .q-label {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .q-english {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .q-chinese {
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .q-audio-row {
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .q-audio-btn {
    background: var(--blue);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    min-height: 38px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .q-audio-btn:active { background: var(--blue-dark); }
  .q-audio-btn.slow { background: var(--gold); }
  .q-audio-btn.slow:active { background: var(--gold-dark); }

  /* ============ ANSWER CHOICES ============ */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
  }
  .choice-btn {
    background: var(--paper);
    border: 2px solid var(--cream-dark);
    padding: 14px 16px;
    border-radius: 14px;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    min-height: 52px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .choice-btn:not(.disabled):active {
    transform: scale(0.98);
  }
  .choice-btn:not(.disabled):hover {
    border-color: var(--blue);
  }
  .choice-btn .letter {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--cream);
    color: var(--ink-soft);
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .choice-btn .text { flex: 1; }
  .choice-btn.correct {
    background: rgba(122, 132, 113, 0.15);
    border-color: var(--sage);
  }
  .choice-btn.correct .letter { background: var(--sage); color: white; }
  .choice-btn.correct::after {
    content: '✓';
    color: var(--sage-dark);
    font-weight: 700;
    font-size: 20px;
  }
  .choice-btn.wrong {
    background: rgba(200, 107, 74, 0.1);
    border-color: var(--terra);
  }
  .choice-btn.wrong .letter { background: var(--terra); color: white; }
  .choice-btn.wrong::after {
    content: '✗';
    color: var(--terra-dark);
    font-weight: 700;
    font-size: 20px;
  }
  .choice-btn.disabled { cursor: not-allowed; }
  .choice-btn.dimmed { opacity: 0.45; }

  /* Skip / Feedback */
  .feedback {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-soft);
    margin-top: 6px;
    min-height: 22px;
  }
  .feedback.good { color: var(--sage-dark); font-weight: 600; }
  .feedback.bad { color: var(--terra-dark); font-weight: 600; }

  /* Next button */
  .next-q-btn {
    background: var(--blue);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    min-height: 48px;
    width: 100%;
    margin-top: 8px;
  }
  .next-q-btn:active { background: var(--blue-dark); }

  /* ============ RESULT SCREEN ============ */
  .result-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    padding: 10px 0;
  }
  .result-emoji {
    font-size: 72px;
    margin-bottom: 12px;
    animation: bounce 0.6s ease;
  }
  @keyframes bounce {
    0% { transform: scale(0) rotate(-180deg); }
    60% { transform: scale(1.2) rotate(10deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .result-title {
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 28px;
    color: var(--ink);
    margin-bottom: 6px;
  }
  .result-subtitle {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 15px;
    margin-bottom: 20px;
  }
  .result-stars {
    display: flex;
    justify-content: center;
    gap: 10px;
    font-size: 44px;
    margin-bottom: 18px;
  }
  .result-stars .star {
    filter: grayscale(1) opacity(0.25);
    transition: filter 0.4s ease, transform 0.4s ease;
  }
  .result-stars .star.earned {
    filter: none;
    animation: starPop 0.6s ease;
  }
  .result-stars .star:nth-child(1).earned { animation-delay: 0.2s; animation-fill-mode: backwards; }
  .result-stars .star:nth-child(2).earned { animation-delay: 0.5s; animation-fill-mode: backwards; }
  .result-stars .star:nth-child(3).earned { animation-delay: 0.8s; animation-fill-mode: backwards; }

  .result-stats {
    background: var(--cream);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-around;
  }
  .result-stat { text-align: center; }
  .result-stat .v {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    display: block;
  }
  .result-stat .l {
    font-size: 11px;
    color: var(--ink-soft);
    font-style: italic;
  }
  .result-stat .v.good { color: var(--sage-dark); }
  .result-stat .v.bad { color: var(--terra-dark); }

  .result-actions {
    display: flex;
    gap: 10px;
  }
  .result-btn {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    min-height: 50px;
  }
  .result-btn.primary {
    background: var(--blue);
    color: white;
  }
  .result-btn.primary:active { background: var(--blue-dark); }
  .result-btn.secondary {
    background: var(--cream);
    color: var(--ink);
  }
  .result-btn.secondary:active { background: var(--cream-dark); }

  .map-footer {
    text-align: center;
    padding: 20px 0;
    color: var(--ink-soft);
    font-size: 13px;
    font-style: italic;
    font-family: 'Fraunces', serif;
  }
  .reset-btn {
    background: transparent;
    border: 1px dashed var(--cream-dark);
    color: var(--ink-soft);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 12px;
    cursor: pointer;
    margin-top: 10px;
  }
  .reset-btn:active { background: var(--cream); }

  .toast {
    position: fixed;
    bottom: calc(30px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(120%);
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    border-radius: 14px;
    font-size: 14px;
    z-index: 200;
    transition: transform 0.3s ease;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (min-width: 480px) {
    .level-node { width: 240px; }
    .game-header h1 { font-size: 36px; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="game-header">
    <a class="back-btn" href="../index.html" aria-label="返回主頁">←</a>
    <div class="ornament">· · ·</div>
    <h1>對答小鎮 🏘️</h1>
    <div class="subtitle">Quick-Response Challenge</div>
  </div>

  <div class="overall-stats">
    <div class="stat">
      <span class="num" id="stats-levels">0/8</span>
      <span class="lbl">過關</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="num" id="stats-stars">0</span>
      <span class="lbl">⭐ 星</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat">
      <span class="num" id="stats-progress">0%</span>
      <span class="lbl">完成度</span>
    </div>
  </div>

  <div class="map" id="map"></div>

  <div class="map-footer">
    ⏱️ 10 秒倒數 · 答啱解鎖下關
    <br>
    <button class="reset-btn" onclick="resetProgress()">🔄 重新開始</button>
  </div>

</div>

<!-- Game modal -->
<div class="game-modal" id="game-modal">
  <div class="game-sheet">
    <div class="game-header-inner">
      <div class="game-title" id="game-title">關卡</div>
      <button class="close-game" onclick="closeGame()">✕</button>
    </div>

    <div class="top-meta">
      <div class="game-progress-bar">
        <div class="game-progress-fill" id="game-progress-fill" style="width: 0%;"></div>
      </div>
      <div class="score-badge">✓ <span id="score-display">0</span></div>
    </div>

    <!-- Question view -->
    <div class="question-view" id="question-view">
      <div class="timer-wrap">
        <div class="timer-circle" id="timer-circle">
          <svg viewBox="0 0 80 80">

    boss: true,
    mixed: true,
    questionCount: 12,
    timeLimit: 5,
    requiresAllStars: 2
  }
];

// ================================================================
// STATE
// ================================================================
const STORAGE_KEY = 'hannah_qa_game_v1';
let gameState = loadProgress();
let currentLevel = null;
let currentQuestions = [];
let currentQIndex = 0;
let currentScore = 0;
let currentWrong = 0;
let currentTimer = null;
let timeRemaining = 0;
let answered = false;
let englishVoice = null;

function loadProgress() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  return { levels: {} };
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
  } catch (e) { console.warn('Save failed:', e); }
}

function resetProgress() {
  if (confirm('確認重新開始？之前嘅星星會消失！')) {
    gameState = { levels: {} };
    saveProgress();
    renderMap();
    updateStats();
  }
}

// ================================================================
// MAP
// ================================================================
function isUnlocked(levelId) {
  if (levelId === 1) return true;
  const level = LEVELS[levelId - 1];
  if (level && level.requiresAllStars) {
    for (let i = 1; i <= 6; i++) {
      if (!gameState.levels[i] || gameState.levels[i].stars < level.requiresAllStars) {
        return false;
      }
    }
    return true;
  }
  const prev = gameState.levels[levelId - 1];
  return prev && prev.stars >= 1;
}

function renderMap() {
  const map = document.getElementById('map');
  map.innerHTML = '';

  LEVELS.forEach(level => {
    const prog = gameState.levels[level.id];
    const unlocked = isUnlocked(level.id);
    const completed = prog && prog.stars >= 1;

    const wrap = document.createElement('div');
    wrap.className = 'level';

    const node = document.createElement('div');
    node.className = 'level-node';
    if (!unlocked) node.classList.add('locked');
    else if (completed) node.classList.add('completed');
    else node.classList.add('unlocked');
    if (level.boss) node.classList.add('boss');

    const stars = prog ? prog.stars : 0;

    node.innerHTML = `
      <div class="level-num">關卡 ${level.id}</div>
      <div class="emoji">${level.emoji}</div>
      <div class="title">${level.title}</div>
      <div class="sub">${level.subtitle}</div>
      ${unlocked ? `
        <div class="stars">
          <span class="star ${stars >= 1 ? 'earned' : ''}">⭐</span>
          <span class="star ${stars >= 2 ? 'earned' : ''}">⭐</span>
          <span class="star ${stars >= 3 ? 'earned' : ''}">⭐</span>
        </div>
      ` : '<div class="lock-icon">🔒</div>'}
    `;

    node.onclick = () => {
      if (!unlocked) {
        if (level.boss) {
          showToast('🔒 1-6 關每關要至少 2 ⭐ 先解鎖 Boss！');
        } else {
          showToast('🔒 完成前一關先！');
        }
        return;
      }
      startLevel(level);
    };

    wrap.appendChild(node);
    map.appendChild(wrap);
  });
}

function updateStats() {
  let completed = 0;
  let totalStars = 0;
  LEVELS.forEach(level => {
    const prog = gameState.levels[level.id];
    if (prog && prog.stars >= 1) completed++;
    if (prog) totalStars += prog.stars;
  });
  document.getElementById('stats-levels').textContent = `${completed}/${LEVELS.length}`;
  document.getElementById('stats-stars').textContent = totalStars;
  const pct = Math.round((completed / LEVELS.length) * 100);
  document.getElementById('stats-progress').textContent = pct + '%';
}

// ================================================================
// TOAST
// ================================================================
let toastTimer;
function showToast(text) {
  const toast = document.getElementById('toast');
  toast.textContent = text;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

// ================================================================
// SPEECH
// ================================================================
function loadVoices() {
  const voices = speechSynthesis.getVoices();
  englishVoice = voices.find(v => v.lang === 'en-GB' && v.name.toLowerCase().includes('female')) ||
                 voices.find(v => v.lang === 'en-GB') ||
                 voices.find(v => v.lang.startsWith('en-')) ||
                 voices[0];
}
if (typeof speechSynthesis !== 'undefined') {
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, speed = 0.3) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = speed;
  u.pitch = 1;
  u.volume = 1;
  if (englishVoice) u.voice = englishVoice;
  u.lang = 'en-GB';
  speechSynthesis.speak(u);
}

function speakQuestion(speed = 0.3) {
  const q = currentQuestions[currentQIndex];
  if (q) speak(q.en, speed);
}

// ================================================================
// GAME FLOW
// ================================================================
function startLevel(level) {
  currentLevel = level;
  currentQuestions = buildQuestions(level);
  currentQIndex = 0;
  currentScore = 0;
  currentWrong = 0;

  document.getElementById('question-view').style.display = 'flex';
  document.getElementById('result-view').style.display = 'none';
  document.getElementById('game-title').textContent = `${level.emoji} ${level.title}`;

  const card = document.getElementById('question-card');
  card.classList.toggle('boss-card', !!level.boss);

  document.getElementById('game-modal').classList.add('open');
  renderQuestion();
}

function buildQuestions(level) {
  if (level.mixed) {
    const pool = [];
    for (let i = 1; i <= 6; i++) {
      const lvl = LEVELS[i - 1];
      if (lvl.questions) pool.push(...lvl.questions);
    }
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, level.questionCount || 10);
  }
  return [...level.questions];
}

function renderQuestion() {
  const q = currentQuestions[currentQIndex];
  if (!q) return;
  answered = false;

  document.getElementById('q-english').textContent = q.en;
  document.getElementById('q-chinese').textContent = q.zh;

  // Update score and progress
  document.getElementById('score-display').textContent = currentScore;
  const pct = (currentQIndex / currentQuestions.length) * 100;
  document.getElementById('game-progress-fill').style.width = pct + '%';

  // Render choices
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const letters = ['A', 'B', 'C'];
  q.choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span class="text">${choice}</span>`;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });

  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-q-btn').style.display = 'none';

  // Auto-play question
  setTimeout(() => speakQuestion(), 300);

  // Start timer
  const timeLimit = currentLevel.timeLimit || 10;
  startTimer(timeLimit);
}

function startTimer(seconds) {
  stopTimer();
  timeRemaining = seconds;
  const timerText = document.getElementById('timer-text');
  const timerProgress = document.getElementById('timer-progress');
  const timerCircle = document.getElementById('timer-circle');
  const circumference = 213.6; // 2 * π * 34

  timerText.textContent = timeRemaining;
  timerProgress.style.strokeDasharray = circumference;
  timerProgress.style.strokeDashoffset = 0;
  timerCircle.classList.remove('warning', 'danger');

  const startTime = Date.now();
  const totalMs = seconds * 1000;

  currentTimer = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const remaining = Math.max(0, totalMs - elapsed);
    const remainingSec = Math.ceil(remaining / 1000);
    timerText.textContent = remainingSec;

    // Update circle
    const offset = circumference * (elapsed / totalMs);
    timerProgress.style.strokeDashoffset = offset;

    // Warning / danger
    const pctLeft = remaining / totalMs;
    timerCircle.classList.toggle('warning', pctLeft < 0.5 && pctLeft >= 0.25);
    timerCircle.classList.toggle('danger', pctLeft < 0.25);

    if (remaining <= 0) {
      stopTimer();
      if (!answered) timeUp();
    }
  }, 100);
}

function stopTimer() {
  if (currentTimer) {
    clearInterval(currentTimer);
    currentTimer = null;
  }
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  stopTimer();

  const q = currentQuestions[currentQIndex];
  const correct = q.correct;
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === correct) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
  });

  const feedback = document.getElementById('feedback');
  if (idx === correct) {
    currentScore++;
    feedback.textContent = '✓ 答啱！好嘢！';
    feedback.className = 'feedback good';
  } else {
    currentWrong++;
    feedback.textContent = `✗ 啱嘅係：${q.choices[correct]}`;
    feedback.className = 'feedback bad';
  }

  document.getElementById('score-display').textContent = currentScore;

  // Auto-play correct answer for learning
  setTimeout(() => speak(q.choices[correct]), 400);

  document.getElementById('next-q-btn').style.display = 'block';
}

function timeUp() {
  answered = true;
  const q = currentQuestions[currentQIndex];
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === q.correct) btn.classList.add('correct');
    else btn.classList.add('dimmed');
  });

  currentWrong++;
  const feedback = document.getElementById('feedback');
  feedback.textContent = `⏱️ 時間到！啱嘅係：${q.choices[q.correct]}`;
  feedback.className = 'feedback bad';

  setTimeout(() => speak(q.choices[q.correct]), 400);

  document.getElementById('next-q-btn').style.display = 'block';
}

function nextQuestion() {
  currentQIndex++;
  if (currentQIndex >= currentQuestions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function computeStars(score, total) {
  const pct = score / total;
  if (pct >= 0.9) return 3;
  if (pct >= 0.7) return 2;
  if (pct >= 0.5) return 1;
  return 0;
}

function showResult() {
  stopTimer();
  document.getElementById('game-progress-fill').style.width = '100%';

  const total = currentQuestions.length;
  const stars = computeStars(currentScore, total);

  const existing = gameState.levels[currentLevel.id];
  const maxStars = Math.max(stars, existing ? existing.stars : 0);
  gameState.levels[currentLevel.id] = { stars: maxStars, played: true };
  saveProgress();

  document.getElementById('question-view').style.display = 'none';
  document.getElementById('result-view').style.display = 'flex';

  const emojis = ['😅', '🙂', '😊', '🤩'];
  const titles = ['差少少！', '過關啦！', '好叻！', '完美！'];
  const subs = [
    '多練幾次就得 💪',
    `你答啱 ${currentScore} / ${total} 題 👍`,
    `你答啱 ${currentScore} / ${total} 題 🌟`,
    `全部都啱！反應超快 🎉`
  ];
  document.getElementById('result-emoji').textContent = emojis[stars];
  document.getElementById('result-title').textContent = titles[stars];
  document.getElementById('result-subtitle').textContent = subs[stars];
  document.getElementById('result-good').textContent = currentScore;
  document.getElementById('result-bad').textContent = currentWrong;

  document.querySelectorAll('.result-stars .star').forEach((el, i) => {
    el.classList.remove('earned');
    if (i < stars) {
      setTimeout(() => el.classList.add('earned'), 100);
    }
  });

  const nextBtn = document.getElementById('next-level-btn');
  const nextLevel = LEVELS[currentLevel.id];
  if (stars === 0) {
    nextBtn.textContent = '再試一次';
    nextBtn.onclick = retryLevel;
  } else if (nextLevel && isUnlocked(nextLevel.id)) {
    nextBtn.textContent = '下一關 →';
    nextBtn.onclick = () => { closeGame(); setTimeout(() => startLevel(nextLevel), 300); };
  } else {
    nextBtn.textContent = '返回地圖';
    nextBtn.onclick = closeGame;
  }
}

function retryLevel() {
  if (currentLevel) startLevel(currentLevel);
}

function closeGame() {
  stopTimer();
  document.getElementById('game-modal').classList.remove('open');
  speechSynthesis.cancel();
  renderMap();
  updateStats();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeGame();
});

// ================================================================
// INIT
// ================================================================
renderMap();
updateStats();
</script>
